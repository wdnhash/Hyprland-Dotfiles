# ╔══════════════════════════════════════════════════════════════╗
# ║          GTK settings — mono, sem botões de janela             ║
# ╚══════════════════════════════════════════════════════════════╝
# Deployado pelo postinstall.sh para:
#   ~/.config/gtk-3.0/settings.ini  e  ~/.config/gtk-4.0/settings.ini
#
# gtk-decoration-layout=:  → headerbar sem NENHUM botão (fechar incluso).
# Feche janelas pelo Hyprland: SUPER+Q.
# ⚠ Se usar o nwg-look, ele pode reescrever este arquivo — rode o
#   postinstall de novo (ou copie manualmente) pra restaurar.

[Settings]
gtk-theme-name=adw-gtk3-dark
gtk-icon-theme-name=Colloid-Dark
gtk-application-prefer-dark-theme=1
gtk-decoration-layout=:
gtk-cursor-theme-name=Bibata-Original-Classic
gtk-cursor-theme-size=24
